aid: tropic
name: Tropic
description: >-
  Tropic is an intelligent procurement platform that combines AI-powered spend
  management, supplier management, and benchmark data to help organizations
  find and capture savings opportunities. Tropic's AI agents track renewals,
  spot shadow spend, flag compliance issues, and automate manual procurement
  tasks with SKU-level price benchmarks from thousands of actual deals.
type: Index
